  <text x="800" y="344" class="desc" text-anchor="middle" font-size="11">src/ipc.ts（业务包装）  ⇄  src/bindings.ts（make bindings 生成，勿手改）  ⇄  #[tauri::command] + #[specta::specta]</text>

