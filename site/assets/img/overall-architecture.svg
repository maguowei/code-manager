    <text x="170" y="754" class="desc" text-anchor="middle">共享配置树</text>

    <rect x="312" y="674" width="220" height="92" rx="6" fill="#0f172a"/>
    <rect x="312" y="674" width="220" height="92" rx="6" fill="rgba(76,29,149,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="422" y="706" class="name" text-anchor="middle" font-size="12">history.jsonl</text>
    <text x="422" y="726" class="desc" text-anchor="middle">~/.claude/</text>
    <text x="422" y="746" class="desc" text-anchor="middle">→ Projects 数据源</text>

    <rect x="564" y="674" width="220" height="92" rx="6" fill="#0f172a"/>
    <rect x="564" y="674" width="220" height="92" rx="6" fill="rgba(76,29,149,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="674" y="706" class="name" text-anchor="middle" font-size="12">~/.claude.json</text>
    <text x="674" y="736" class="desc" text-anchor="middle">→ Stats 数据源</text>

    <rect x="816" y="674" width="220" height="92" rx="6" fill="#0f172a"/>
    <rect x="816" y="674" width="220" height="92" rx="6" fill="rgba(76,29,149,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
