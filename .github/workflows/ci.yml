name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-26
          - platform: ubuntu-24.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: 安装 pnpm
        uses: pnpm/action-setup@v5

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 GNU Make (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install make -y --no-progress

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 前端代码检查 (Biome)
        run: make lint-frontend

      - name: 前端类型检查与构建
        run: make build-frontend

      - name: 前端测试
        if: matrix.platform != 'ubuntu-24.04'
        run: make test-frontend

      - name: 前端测试覆盖率
        if: matrix.platform == 'ubuntu-24.04'
        run: make coverage-frontend

      - name: Rust 编译检查
        run: make check

      - name: Rust 格式检查
        run: make fmt-rust-check

      - name: Rust Lint
        run: make lint-rust

      - name: Rust 单元测试
        run: make test-rust
