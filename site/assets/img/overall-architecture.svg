  <rect x="40" y="96" width="1520" height="150" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="54" y="116" class="region" fill="#22d3ee">前端 · React 19 + TypeScript + Vite + Tailwind CSS v4 + shadcn/ui</text>

  <g>
    <rect x="60" y="128" width="272" height="68" rx="6" fill="#0f172a"/>
    <rect x="60" y="128" width="272" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="196" y="158" class="name" text-anchor="middle">配置工作台</text>
    <text x="196" y="178" class="desc" text-anchor="middle">Profiles · Presets 编辑器</text>

    <rect x="362" y="128" width="272" height="68" rx="6" fill="#0f172a"/>
    <rect x="362" y="128" width="272" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="498" y="158" class="name" text-anchor="middle">记忆 · Skills</text>
    <text x="498" y="178" class="desc" text-anchor="middle">Memory · Skills 管理</text>

    <rect x="664" y="128" width="272" height="68" rx="6" fill="#0f172a"/>
    <rect x="664" y="128" width="272" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="800" y="158" class="name" text-anchor="middle">项目 · 历史</text>
    <text x="800" y="178" class="desc" text-anchor="middle">Projects · History</text>

    <rect x="966" y="128" width="272" height="68" rx="6" fill="#0f172a"/>
    <rect x="966" y="128" width="272" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="1102" y="158" class="name" text-anchor="middle">统计 · 用量</text>
    <text x="1102" y="178" class="desc" text-anchor="middle">Stats · Usage 费用</text>

    <rect x="1268" y="128" width="272" height="68" rx="6" fill="#0f172a"/>
    <rect x="1268" y="128" width="272" height="68" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="1404" y="158" class="name" text-anchor="middle">Claude 总览</text>
    <text x="1404" y="178" class="desc" text-anchor="middle">~/.claude 共享树预览</text>
  </g>
  <text x="800" y="226" class="note" text-anchor="middle">表单 react-hook-form + Zod + JSON Schema · 编辑 CodeMirror · 图表 Recharts · 虚拟列表 @tanstack/react-virtual · Diff @pierre</text>

  <!-- ===== L2 IPC 桥 ===== -->
  <rect x="40" y="294" width="1520" height="66" rx="10" fill="#0f172a"/>
  <rect x="40" y="294" width="1520" height="66" rx="10" fill="rgba(120,53,15,0.35)" stroke="#fb923c" stroke-width="1.5"/>
