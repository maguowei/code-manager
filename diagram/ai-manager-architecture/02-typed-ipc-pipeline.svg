<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'SF Mono', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #f1f5f9; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #94a3b8; }
    .region { font-size: 14px; font-weight: 700; }
    .name { font-size: 14px; font-weight: 600; fill: #f8fafc; }
    .mono { font-size: 11px; font-weight: 500; fill: #e2e8f0; }
    .desc { font-size: 10px; font-weight: 400; fill: #94a3b8; }
    .edge { font-size: 10px; font-weight: 500; fill: #fbbf24; }
    .chip { font-size: 11px; font-weight: 500; fill: #f1f5f9; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fb923c"/>
    </marker>
    <marker id="arrow-sm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="40" y="46" class="title">类型化 IPC 链路 · tauri-specta</text>
  <text x="40" y="72" class="subtitle">Rust 是契约权威源；类型从后端单向生成到前端，编译期对齐，业务代码统一走 ipc 包装</text>

  <!-- ===== 代码生成 / 调用主链 (LTR) ===== -->
  <text x="50" y="150" class="region" fill="#fb923c">① 代码生成链（编译期 · 单向生成）→ 调用入口</text>

  <!-- 主链箭头 -->
  <line x1="250" y1="255" x2="306" y2="255" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="255" x2="566" y2="255" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="770" y1="255" x2="826" y2="255" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1030" y1="255" x2="1086" y2="255" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1290" y1="255" x2="1346" y2="255" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="278" y="246" class="edge" text-anchor="middle">类型反射</text>
  <text x="538" y="246" class="edge" text-anchor="middle">specta schema</text>
  <text x="798" y="246" class="edge" text-anchor="middle">codegen</text>
  <text x="1058" y="246" class="edge" text-anchor="middle">import</text>
  <text x="1318" y="246" class="edge" text-anchor="middle">ipc.xxx()</text>

  <!-- Stage 1 -->
  <rect x="50" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="50" y="180" width="200" height="150" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="150" y="212" class="name" text-anchor="middle">Rust Command</text>
  <text x="150" y="240" class="mono" text-anchor="middle">#[tauri::command]</text>
  <text x="150" y="258" class="mono" text-anchor="middle">#[specta::specta]</text>
  <text x="150" y="290" class="desc" text-anchor="middle">config.rs · memory.rs</text>
  <text x="150" y="306" class="desc" text-anchor="middle">history.rs · usage.rs …</text>

  <!-- Stage 2 -->
  <rect x="310" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="310" y="180" width="200" height="150" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="410" y="212" class="name" text-anchor="middle">Specta 注册</text>
  <text x="410" y="244" class="mono" text-anchor="middle">collect_commands![]</text>
  <text x="410" y="284" class="desc" text-anchor="middle">lib.rs</text>
  <text x="410" y="300" class="desc" text-anchor="middle">build_specta_builder()</text>

  <!-- Stage 3 -->
  <rect x="570" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="570" y="180" width="200" height="150" rx="8" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="670" y="212" class="name" text-anchor="middle">make bindings</text>
  <text x="670" y="244" class="mono" text-anchor="middle">tauri-specta</text>
  <text x="670" y="284" class="desc" text-anchor="middle">生成 TypeScript</text>
  <text x="670" y="300" class="desc" text-anchor="middle">bindings-check 守门</text>

  <!-- Stage 4 -->
  <rect x="830" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="830" y="180" width="200" height="150" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="930" y="212" class="name" text-anchor="middle">src/bindings.ts</text>
  <text x="930" y="244" class="mono" text-anchor="middle">commands + events</text>
  <text x="930" y="284" class="desc" text-anchor="middle">生成文件 · 勿手改</text>
  <text x="930" y="300" class="desc" text-anchor="middle">仅此处 import invoke()</text>

  <!-- Stage 5 -->
  <rect x="1090" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="1090" y="180" width="200" height="150" rx="8" fill="rgba(120,53,15,0.35)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1190" y="212" class="name" text-anchor="middle">src/ipc.ts</text>
  <text x="1190" y="244" class="mono" text-anchor="middle">ipc 包装 / 兼容层</text>
  <text x="1190" y="284" class="desc" text-anchor="middle">统一调用入口</text>
  <text x="1190" y="300" class="desc" text-anchor="middle">错误处理收口</text>

  <!-- Stage 6 -->
  <rect x="1350" y="180" width="200" height="150" rx="8" fill="#0f172a"/>
  <rect x="1350" y="180" width="200" height="150" rx="8" fill="rgba(8,51,68,0.55)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1450" y="212" class="name" text-anchor="middle">前端业务</text>
  <text x="1450" y="244" class="mono" text-anchor="middle">ipc.getXxx()</text>
  <text x="1450" y="284" class="desc" text-anchor="middle">组件 / hooks</text>
  <text x="1450" y="300" class="desc" text-anchor="middle">类型安全调用</text>

  <!-- ===== ② 运行时调用链 (左下) ===== -->
  <rect x="50" y="400" width="720" height="430" rx="12" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="64" y="428" class="region" fill="#22d3ee">② 运行时调用链（请求 ↓ / 类型化结果 ↑）</text>

  <line x1="410" y1="488" x2="410" y2="514" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <line x1="410" y1="566" x2="410" y2="592" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <line x1="410" y1="644" x2="410" y2="670" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-sm)"/>
  <line x1="410" y1="722" x2="410" y2="748" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-sm)"/>

  <rect x="195" y="450" width="430" height="38" rx="6" fill="#0f172a"/>
  <rect x="195" y="450" width="430" height="38" rx="6" fill="rgba(8,51,68,0.55)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="410" y="474" class="mono" text-anchor="middle">前端组件 / hooks · 调用 ipc.getXxx()</text>

  <rect x="195" y="528" width="430" height="38" rx="6" fill="#0f172a"/>
  <rect x="195" y="528" width="430" height="38" rx="6" fill="rgba(120,53,15,0.35)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="410" y="552" class="mono" text-anchor="middle">src/ipc.ts · 统一包装 / 错误收口</text>

  <rect x="195" y="606" width="430" height="38" rx="6" fill="#0f172a"/>
  <rect x="195" y="606" width="430" height="38" rx="6" fill="rgba(120,53,15,0.35)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="410" y="630" class="mono" text-anchor="middle">bindings.ts → @tauri-apps/api/core invoke()</text>

  <rect x="195" y="684" width="430" height="38" rx="6" fill="#0f172a"/>
  <rect x="195" y="684" width="430" height="38" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="410" y="708" class="mono" text-anchor="middle">Tauri IPC 通道 · 序列化 / 反序列化</text>

  <rect x="195" y="762" width="430" height="38" rx="6" fill="#0f172a"/>
  <rect x="195" y="762" width="430" height="38" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
  <text x="410" y="786" class="mono" text-anchor="middle">Rust #[tauri::command] handler · 返回类型化结果</text>

  <!-- ===== ③ 命令变更同步清单 (右下) ===== -->
  <rect x="820" y="400" width="730" height="430" rx="12" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="834" y="428" class="region" fill="#fb7185">③ 新增 / 修改命令的同步清单（架构同步点）</text>

  <!-- 8 chips, 2 cols x 4 rows -->
  <g>
    <rect x="840" y="450" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="840" y="450" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="858" y="482" class="chip">1 · Rust command</text>
    <text x="858" y="506" class="desc">#[tauri::command] + #[specta::specta]</text>

    <rect x="1195" y="450" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="1195" y="450" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="1213" y="482" class="chip">2 · Specta 注册</text>
    <text x="1213" y="506" class="desc">collect_commands![] @ lib.rs</text>

    <rect x="840" y="544" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="840" y="544" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="858" y="576" class="chip">3 · 重新生成 bindings</text>
    <text x="858" y="600" class="desc">make bindings / make bindings-check</text>

    <rect x="1195" y="544" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="1195" y="544" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="1213" y="576" class="chip">4 · src/ipc.ts 兼容包装</text>
    <text x="1213" y="600" class="desc">如需新增/调整调用入口</text>

    <rect x="840" y="638" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="840" y="638" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="858" y="670" class="chip">5 · src/types.ts</text>
    <text x="858" y="694" class="desc">前端类型契约对齐</text>

    <rect x="1195" y="638" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="1195" y="638" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="1213" y="670" class="chip">6 · i18n 文案</text>
    <text x="1213" y="694" class="desc">useI18n() 的 t() · 不硬编码</text>

    <rect x="840" y="732" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="840" y="732" width="335" height="78" rx="6" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="858" y="764" class="chip">7 · 范围内测试</text>
    <text x="858" y="788" class="desc">vitest / make test-rust</text>

    <rect x="1195" y="732" width="335" height="78" rx="6" fill="#0f172a"/>
    <rect x="1195" y="732" width="335" height="78" rx="6" fill="rgba(136,19,55,0.45)" stroke="#fb7185" stroke-width="1.2"/>
    <text x="1213" y="764" class="chip">8 · capabilities/default.json</text>
    <text x="1213" y="788" class="desc">涉及插件 API 时检查权限</text>
  </g>
</svg>
