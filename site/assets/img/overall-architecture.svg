    <rect x="1320" y="674" width="220" height="92" rx="6" fill="#0f172a"/>
    <rect x="1320" y="674" width="220" height="92" rx="6" fill="rgba(76,29,149,0.45)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1430" y="702" class="name" text-anchor="middle" font-size="12">~/.config/ai-manager/</text>
    <text x="1430" y="722" class="desc" text-anchor="middle">config-registry · memories</text>
    <text x="1430" y="736" class="desc" text-anchor="middle">model-pricing · skills-disabled</text>
