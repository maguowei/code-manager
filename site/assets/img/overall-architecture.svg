<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', 'SF Mono', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #f1f5f9; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #94a3b8; }
    .region { font-size: 13px; font-weight: 700; }
    .name { font-size: 14px; font-weight: 600; fill: #f8fafc; }
    .desc { font-size: 10px; font-weight: 400; fill: #94a3b8; }
    .note { font-size: 11px; font-weight: 400; fill: #cbd5e1; }
    .legend { font-size: 11px; font-weight: 500; fill: #cbd5e1; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="40" y="46" class="title">AI Manager · 整体分层架构</text>
  <text x="40" y="72" class="subtitle">基于 Tauri 2 的 Claude Code 本地配置管理桌面应用 · React 19 前端 + Rust 后端</text>

  <!-- 顶部图例 -->
  <g>
    <rect x="1130" y="32" width="14" height="14" rx="3" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="1150" y="43" class="legend">前端</text>
    <rect x="1210" y="32" width="14" height="14" rx="3" fill="rgba(120,53,15,0.4)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="1230" y="43" class="legend">IPC</text>
    <rect x="1285" y="32" width="14" height="14" rx="3" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="1305" y="43" class="legend">后端</text>
    <rect x="1370" y="32" width="14" height="14" rx="3" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1390" y="43" class="legend">数据源</text>
  </g>

  <!-- 层间连接箭头 (双向: invoke ↓ / event ↑) -->
  <line x1="400" y1="248" x2="400" y2="291" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow)"/>
  <line x1="800" y1="248" x2="800" y2="291" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow)"/>
  <line x1="1200" y1="291" x2="1200" y2="248" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow-up)"/>
  <text x="820" y="276" class="desc" fill="#fb923c">invoke ↓ / event ↑</text>

  <line x1="400" y1="361" x2="400" y2="396" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow)"/>
  <line x1="800" y1="361" x2="800" y2="396" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow)"/>
  <line x1="1200" y1="361" x2="1200" y2="396" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.55" marker-end="url(#arrow)"/>

  <line x1="400" y1="592" x2="400" y2="637" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="592" x2="800" y2="637" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="1200" y1="592" x2="1200" y2="637" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrow)"/>
  <text x="820" y="624" class="desc" fill="#a78bfa">读取 / 原子写入</text>

