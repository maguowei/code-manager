    <!-- SQLite 圆柱 -->
    <g transform="translate(1068, 686)">
      <rect x="0" y="12" width="220" height="58" fill="#0f172a"/>
      <ellipse cx="110" cy="12" rx="110" ry="13" fill="#0f172a"/>
