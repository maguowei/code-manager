    <text x="1178" y="486" class="desc" text-anchor="middle">共享树 + watcher</text>
    <text x="1178" y="500" class="desc" text-anchor="middle">实时变更监听</text>

    <rect x="1320" y="434" width="220" height="80" rx="6" fill="#0f172a"/>
    <rect x="1320" y="434" width="220" height="80" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="1430" y="466" class="name" text-anchor="middle">tray · led</text>
    <text x="1430" y="486" class="desc" text-anchor="middle">notifications</text>
    <text x="1430" y="500" class="desc" text-anchor="middle">托盘 · 灯效 · 通知</text>
  </g>
  <text x="800" y="568" class="note" text-anchor="middle">公共基础设施：utils.rs（文件读写 / 锁 / 时间 / JSON）· logging.rs · plugins.rs · terminal_focus.rs · macos_notifications.rs</text>

