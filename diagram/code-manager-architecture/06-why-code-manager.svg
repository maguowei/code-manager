<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #f1f5f9; }
    .subtitle { font-size: 13px; font-weight: 400; fill: #94a3b8; }
    .banner { font-size: 14px; font-weight: 600; fill: #dbeafe; }
    .colhead { font-size: 16px; font-weight: 700; }
    .rowlabel { font-size: 13px; font-weight: 700; }
    .pain { font-size: 12px; font-weight: 400; fill: #fda4af; }
    .cap { font-size: 12px; font-weight: 400; fill: #bfdbfe; }
    .gain { font-size: 12px; font-weight: 400; fill: #86efac; }
    .anno { font-size: 10px; font-weight: 600; fill: #fb923c; }
    .foot { font-size: 12px; font-weight: 500; fill: #94a3b8; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-orange" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- 标题 -->
  <text x="40" y="46" class="title">Code Manager · 为什么需要它？</text>
  <text x="40" y="72" class="subtitle">三大价值角度：团队配置复用 · 配置最佳实践 · 问题排查 —— 现状痛点 → 能力 → 收益</text>

  <!-- 定位横幅 -->
  <rect x="190" y="92" width="1370" height="46" rx="10" fill="#0f172a"/>
  <rect x="190" y="92" width="1370" height="46" rx="10" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.6"/>
  <text x="875" y="121" class="banner" text-anchor="middle">Code Manager · 本机管理层 — 让配置可见 · 可预览 · 可验证（不替代 Claude Code，而是它的管理层）</text>

  <!-- 横幅 → 列头 连接线 -->
  <line x1="405" y1="138" x2="405" y2="166" stroke="#475569" stroke-width="1.2"/>
  <line x1="875" y1="138" x2="875" y2="166" stroke="#475569" stroke-width="1.2"/>
  <line x1="1345" y1="138" x2="1345" y2="166" stroke="#475569" stroke-width="1.2"/>

  <!-- 列头 -->
  <rect x="190" y="168" width="430" height="46" rx="8" fill="#0f172a"/>
  <rect x="190" y="168" width="430" height="46" rx="8" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="405" y="197" class="colhead" fill="#c4b5fd" text-anchor="middle">① 团队配置复用</text>

  <rect x="660" y="168" width="430" height="46" rx="8" fill="#0f172a"/>
  <rect x="660" y="168" width="430" height="46" rx="8" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="875" y="197" class="colhead" fill="#67e8f9" text-anchor="middle">② 配置最佳实践</text>

  <rect x="1130" y="168" width="430" height="46" rx="8" fill="#0f172a"/>
  <rect x="1130" y="168" width="430" height="46" rx="8" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1345" y="197" class="colhead" fill="#fcd34d" text-anchor="middle">③ 问题排查</text>

  <!-- 左侧行标签栏 -->
  <rect x="40" y="230" width="130" height="136" rx="8" fill="#0f172a"/>
  <rect x="40" y="230" width="130" height="136" rx="8" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="1.2"/>
  <text x="105" y="303" class="rowlabel" fill="#fb7185" text-anchor="middle">现状痛点</text>

  <rect x="40" y="392" width="130" height="188" rx="8" fill="#0f172a"/>
  <rect x="40" y="392" width="130" height="188" rx="8" fill="rgba(59,130,246,0.25)" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="105" y="480" class="rowlabel" fill="#93c5fd" text-anchor="middle">Code Manager</text>
  <text x="105" y="502" class="rowlabel" fill="#93c5fd" text-anchor="middle">能力</text>

  <rect x="40" y="606" width="130" height="136" rx="8" fill="#0f172a"/>
  <rect x="40" y="606" width="130" height="136" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.2"/>
  <text x="105" y="679" class="rowlabel" fill="#34d399" text-anchor="middle">价值收益</text>

  <!-- 行间流向注记 -->
  <text x="105" y="383" class="anno" text-anchor="middle">用 Code Manager</text>
  <text x="105" y="597" class="anno" text-anchor="middle">于是</text>

  <!-- 列内 痛点→能力→收益 箭头 -->
  <line x1="405" y1="366" x2="405" y2="390" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="405" y1="580" x2="405" y2="604" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="875" y1="366" x2="875" y2="390" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="875" y1="580" x2="875" y2="604" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="1345" y1="366" x2="1345" y2="390" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="1345" y1="580" x2="1345" y2="604" stroke="#fb923c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- ===== 痛点行 ===== -->
  <rect x="190" y="230" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="190" y="230" width="430" height="136" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.4"/>
  <text x="210" y="270" class="pain">✗ 每人手攒一套配置</text>
  <text x="210" y="302" class="pain">✗ 新人上手慢、标准不一</text>
  <text x="210" y="334" class="pain">✗ 配置易漂移、难对齐</text>

  <rect x="660" y="230" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="660" y="230" width="430" height="136" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.4"/>
  <text x="680" y="270" class="pain">✗ 手改 JSON 容易出错</text>
  <text x="680" y="302" class="pain">✗ 切换时漏写环境变量</text>
  <text x="680" y="334" class="pain">✗ 配置能否用全靠试</text>

  <rect x="1130" y="230" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="1130" y="230" width="430" height="136" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.4"/>
  <text x="1150" y="270" class="pain">✗ 出问题时日志四处找</text>
  <text x="1150" y="302" class="pain">✗ 会话历史难追溯</text>
  <text x="1150" y="334" class="pain">✗ Token 花费不透明</text>

  <!-- ===== 能力行 ===== -->
  <rect x="190" y="392" width="430" height="188" rx="8" fill="#0f172a"/>
  <rect x="190" y="392" width="430" height="188" rx="8" fill="rgba(59,130,246,0.28)" stroke="#60a5fa" stroke-width="1.4"/>
  <text x="210" y="436" class="cap">● 内置 Provider 共享 · 配置可复用</text>
  <text x="210" y="470" class="cap">● 常用选项 / 市场 / 插件</text>
  <text x="228" y="504" class="cap">一键同步到其余配置</text>
  <text x="210" y="538" class="cap">● 导入现有 settings 起步</text>

  <rect x="660" y="392" width="430" height="188" rx="8" fill="#0f172a"/>
  <rect x="660" y="392" width="430" height="188" rx="8" fill="rgba(59,130,246,0.28)" stroke="#60a5fa" stroke-width="1.4"/>
  <text x="680" y="436" class="cap">● 图形化编辑 + Schema 校验</text>
  <text x="680" y="470" class="cap">● 内置 Provider / 状态行预设</text>
  <text x="680" y="504" class="cap">● 模型连通性测试</text>
  <text x="680" y="538" class="cap">● 一键全量应用，不漏项</text>

  <rect x="1130" y="392" width="430" height="188" rx="8" fill="#0f172a"/>
  <rect x="1130" y="392" width="430" height="188" rx="8" fill="rgba(59,130,246,0.28)" stroke="#60a5fa" stroke-width="1.4"/>
  <text x="1150" y="436" class="cap">● 脱敏日志查看 + 轮转</text>
  <text x="1150" y="470" class="cap">● 会话历史 / Plan 追溯</text>
  <text x="1150" y="504" class="cap">● 用量按项目 / 模型 / 日期聚合</text>
  <text x="1150" y="538" class="cap">● 系统信息一处可见</text>

  <!-- ===== 收益行 ===== -->
  <rect x="190" y="606" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="190" y="606" width="430" height="136" rx="8" fill="rgba(6,78,59,0.45)" stroke="#34d399" stroke-width="1.4"/>
  <text x="210" y="646" class="gain">✓ 团队共享同一套标准配置</text>
  <text x="210" y="678" class="gain">✓ 开箱即用、版本对齐</text>
  <text x="210" y="710" class="gain">✓ 不再各搞各的</text>

  <rect x="660" y="606" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="660" y="606" width="430" height="136" rx="8" fill="rgba(6,78,59,0.45)" stroke="#34d399" stroke-width="1.4"/>
  <text x="680" y="646" class="gain">✓ 配置可预览、可验证</text>
  <text x="680" y="678" class="gain">✓ 按最佳实践落地</text>
  <text x="680" y="710" class="gain">✓ 切换不丢项</text>

  <rect x="1130" y="606" width="430" height="136" rx="8" fill="#0f172a"/>
  <rect x="1130" y="606" width="430" height="136" rx="8" fill="rgba(6,78,59,0.45)" stroke="#34d399" stroke-width="1.4"/>
  <text x="1150" y="646" class="gain">✓ 快速定位行为异常</text>
  <text x="1150" y="678" class="gain">✓ 异常花费一目了然</text>
  <text x="1150" y="710" class="gain">✓ 排障路径统一高效</text>

  <!-- 页脚 -->
  <text x="800" y="788" class="foot" text-anchor="middle">前端 React 19 + Tailwind v4 + shadcn/ui · 后端 Rust + Tauri 2 · 类型化 IPC · 全本地、隐私优先 —— 不替代 Claude Code，而是它的本机管理层</text>
</svg>
