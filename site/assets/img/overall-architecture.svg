    <rect x="816" y="434" width="220" height="80" rx="6" fill="#0f172a"/>
    <rect x="816" y="434" width="220" height="80" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="926" y="466" class="name" text-anchor="middle">project</text>
    <text x="926" y="486" class="desc" text-anchor="middle">native_open</text>
    <text x="926" y="500" class="desc" text-anchor="middle">项目 / 打开本机应用</text>

    <rect x="1068" y="434" width="220" height="80" rx="6" fill="#0f172a"/>
    <rect x="1068" y="434" width="220" height="80" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
