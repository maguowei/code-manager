  </g>
  <text x="800" y="800" class="note" text-anchor="middle">其它输入：~/.codex/skills/（Codex 同步）· 日志 ~/Library/Logs/... · 覆盖项 AI_MANAGER_HOME_OVERRIDE / AI_MANAGER_APP_DATA_DIR_OVERRIDE</text>
